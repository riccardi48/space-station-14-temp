- type: entity
  parent: BaseItem
  id: BaseCards
  name: Deck of Cards
  categories: [ HideSpawnMenu ]
  components:
  - type: Cards
    cards: []
    maxFanned: 10
  - type: Stack
    stackType: CardsStack
    baseLayer: base
    halfOnAltInteract: false
    layerStates:
    - deck_single
    - deck_nanotrasen_low
    - deck_nanotrasen_half
    - deck_nanotrasen_full
    count: 1
    throwIndividually: true
    layerFunction: Threshold
  - type: StackLayerThreshold
    thresholds: [2, 20, 35]
  - type: Sprite
    sprite: Objects/Fun/PlayingCards/nanotrasenbasiccards.rsi
    state: deck_single
    layers:
    - state: deck_single
      map: ["base"]
  - type: Item
    sprite: Objects/Fun/PlayingCards/nanotrasenbasiccards.rsi
    size: Normal
    state: deck_single
  - type: Appearance

