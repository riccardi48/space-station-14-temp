- type: entity
  parent: BaseItem
  id: BaseCards
  name: cards
  hideSpawnMenu: true
  components:
  - type: Cards
    cards: []
  - type: Stack
    stackType: CardsStack
    baseLayer: base
    halfOnAltInteract: false
    layerStates:
    - deck_nanotrasen_empty
    - deck_nanotrasen_low
    - deck_nanotrasen_half
    - deck_nanotrasen_full
    count: 1
    throwIndividually: true
    layerFunction: Threshold
  - type: StackLayerThreshold
    thresholds: [2, 20, 35]
  - type: Sprite
    sprite: Objects/Fun/PlayingCards/nanotrasenbasiccards.rsi
    state: deck_nanotrasen_empty
    layers:
    - state: deck_nanotrasen_empty
      map: ["base"]
  - type: Item
    sprite: Objects/Fun/PlayingCards/nanotrasenbasiccards.rsi

