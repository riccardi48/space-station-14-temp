- type: entity
  parent: [standardDeck, BaseCards]
  id: cardDeck
  name: Deck of Cards
  components:
    - type: Stack
      count: 52
    - type: Sprite
      state: deck_nanotrasen_full

- type: stack
  id: CardsStack
  maxCount: 52
  spawn: BaseCards
  icon: { sprite: /Textures/Objects/Fun/PlayingCards/nanotrasenbasiccards.rsi, state: deck_single }

- type: entity
  parent: [standardDeck, syndiBaseCards]
  id: syndiCards
  name: Deck of Syndicate Cards

- type: entity
  parent: [ BaseCards, BaseSyndicateContraband ]
  id: syndiBaseCards
  name: Deck of Syndicate Cards
  categories: [ HideSpawnMenu ]
  components:
    - type: Cards
      cardBack: syndi_backside
      baseState: syndi_base
    - type: Stack
      stackType: SyndicateCardsStack
      layerStates:
      - deck_single
      - deck_syndicate_low
      - deck_syndicate_half
      - deck_syndicate_full
      count: 52
    - type: Sprite
      state: deck_syndicate_full
    - type: DamageOtherOnHit
      damage:
        types:
          Piercing: 10
          Slash: 8
    - type: EmbeddableProjectile
      offset: 0.0,0.0
    - type: LandAtCursor


- type: stack
  id: SyndicateCardsStack
  maxCount: 52
  spawn: syndiBaseCards
  icon: { sprite: /Textures/Objects/Fun/PlayingCards/nanotrasenbasiccards.rsi, state: deck_single }
