- type: entity
  parent: BaseItem
  id: BaseCards
  name: cards
  hideSpawnMenu: true
  components:
  - type: Cards
    cards: []
  - type: Stack
    stackType: CardsStack
    baseLayer: base
    halfOnAltInteract: false
    layerStates:
    - brass
    - brass_2
    - brass_3
    count: 1
    throwIndividually: true
    layerFunction: Threshold
  - type: StackLayerThreshold
    thresholds: [5, 10]
  - type: Sprite
    sprite: Objects/Materials/Sheets/metal.rsi
    state: brass
    layers:
